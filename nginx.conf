# Bloomfield Terminal — nginx SPA config
#
# - Serves the compiled Vite bundle from /usr/share/nginx/html
# - Falls back to /index.html for any client-side route (react-router)
# - Gzips JS/CSS/JSON/SVG/GeoJSON aggressively
# - Long-cache hashed assets, short-cache index.html

server {
  listen       ${PORT};
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # ─── Compression ──────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/geo+json
    application/manifest+json
    image/svg+xml
    font/woff
    font/woff2;

  # ─── Hashed asset cache ───────────────────────────────────────
  # Vite emits every asset with a content hash in the filename, so we
  # can cache them aggressively and invalidate via new filenames.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ─── index.html — no cache, must revalidate ───────────────────
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # ─── SPA fallback ─────────────────────────────────────────────
  # Any other request is handed to react-router via index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── Healthcheck ──────────────────────────────────────────────
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ─── Noise ────────────────────────────────────────────────────
  location = /favicon.ico { log_not_found off; access_log off; }
  location = /robots.txt  { log_not_found off; access_log off; }
}
